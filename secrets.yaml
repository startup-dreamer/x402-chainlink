staging-secrets:
  # Private key for workflow operations (signing, etc.)
  # Set via: export DEPLOYER_PRIVATE_KEY="0x..."
  deployer-private-key:
    env: DEPLOYER_PRIVATE_KEY

  # RPC API keys (optional, for premium RPC endpoints)
  alchemy-api-key:
    env: ALCHEMY_API_KEY

  infura-api-key:
    env: INFURA_API_KEY

production-secrets:
  # CRITICAL: Use hardware wallet or multisig for production
  # Never store production private keys in environment variables
  deployer-private-key:
    env: PRODUCTION_DEPLOYER_PRIVATE_KEY

  # Production RPC API keys
  alchemy-api-key:
    env: PRODUCTION_ALCHEMY_API_KEY

  infura-api-key:
    env: PRODUCTION_INFURA_API_KEY
